services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://valuesentinel:valuesentinel@db:5432/valuesentinel
      - CHECK_INTERVAL_MINUTES=15
      - LOG_LEVEL=INFO
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  scheduler:
    build: .
    command: ["python", "-m", "valuesentinel.cli", "run"]
    environment:
      - DATABASE_URL=postgresql://valuesentinel:valuesentinel@db:5432/valuesentinel
      - CHECK_INTERVAL_MINUTES=15
      - LOG_LEVEL=INFO
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=valuesentinel
      - POSTGRES_PASSWORD=valuesentinel
      - POSTGRES_DB=valuesentinel
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valuesentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
